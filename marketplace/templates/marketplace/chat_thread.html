{% extends 'base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 80vh; display: flex; flex-direction: column;">
    
    <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px;">
    <a href="{% url 'inbox' %}" style="color: #001f3f; font-size: 1.2rem; text-decoration: none; padding-right: 5px; transition: transform 0.2s;" 
       onmouseover="this.style.transform='translateX(-3px)'" onmouseout="this.style.transform='translateX(0)'">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <img src="{{ product.imageURL }}" style="width: 45px; height: 45px; border-radius: 8px; object-fit: cover;">
    
    <div>
        <h4 style="margin: 0; color: #001f3f;">{{ other_user.username }}</h4>
        <small style="color: #7f8c8d;">Ref: {{ product.title }}</small>
    </div>
</div>

    <div id="chat-box" style="flex-grow: 1; overflow-y: auto; padding: 20px; background: #fafafa;">
        {% for msg in chat_messages %}
            <div style="margin-bottom: 15px; display: flex; flex-direction: column; align-items: {% if msg.sender == request.user %}flex-end{% else %}flex-start{% endif %};">
                <div style="max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; 
                            background: {% if msg.sender == request.user %}#001f3f; color: white;{% else %}#e9ecef; color: #333;{% endif %};">
                    {{ msg.content }}
                </div>
                <small style="font-size: 0.7rem; color: #adb5bd; margin-top: 4px;">{{ msg.timestamp|time:"H:i" }}</small>
            </div>
        {% endfor %}
    </div>

    <form action="{% url 'send_message' product.id %}" method="POST" style="padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px;">
        {% csrf_token %}
        <input type="text" name="content" placeholder="Type your message..." required
               style="flex-grow: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none;">
        <button type="submit" style="background: #001f3f; color: white; border: none; padding: 10px 22px; border-radius: 25px; font-weight: 600; cursor: pointer;">
            Send
        </button>
    </form>
</div>

<script>
    var chatBox = document.getElementById("chat-box");
    chatBox.scrollTop = chatBox.scrollHeight;
</script>
{% endblock %}
