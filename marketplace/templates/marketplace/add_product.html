{% extends 'base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="color: #001f3f; margin-bottom: 10px;">Add New Product</h2>
    <p style="color: #666; margin-bottom: 30px;">Fill in the details to start selling to the campus community.</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        {% for field in form %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 700; color: #001f3f; margin-bottom: 8px;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color: #e74c3c; font-size: 0.8rem;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" style="width: 100%; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s;">
            LAUNCH PRODUCT
        </button>
    </form>
</div>
{% endblock %}
