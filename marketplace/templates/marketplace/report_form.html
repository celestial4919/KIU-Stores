{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="color: #001f3f; margin-bottom: 10px;">
        <i class="fa-solid fa-circle-exclamation" style="color: #e74c3c;"></i> Report Listing
    </h2>
    <p style="color: #7f8c8d; font-size: 0.9rem; margin-bottom: 25px;">
        Help us keep KIU Stores safe. What is wrong with <b>{{ product.title }}</b>?
    </p>

    <form method="POST">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Reason for Report</label>
            <select name="reason" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; background: #fff;">
                <option value="" disabled selected>Select a reason...</option>
                <option value="scam">Potential Scam</option>
                <option value="prohibited">Prohibited/Illegal Item</option>
                <option value="misleading">Misleading Information</option>
                <option value="contact">Asking for off-platform payment</option>
                <option value="other">Other Issue</option>
            </select>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Additional Details</label>
            <textarea name="description" rows="4" placeholder="Explain the issue here..." required 
                      style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; resize: none;"></textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 2; background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Submit Report
            </button>
            <a href="{% url 'product_detail' product.id %}" style="flex: 1; text-align: center; background: #eee; color: #333; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: 600;">
                Cancel
            </a>
        </div>
    </form>
</div>
<a href="{% url 'home' %}" style="text-decoration: none; color: #7f8c8d; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; margin-bottom: 20px;">
        <i class="fa-solid fa-arrow-left"></i> Back to Marketplace
    </a>
{% endblock %}
